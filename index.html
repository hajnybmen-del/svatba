<style
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --forest-deep:#1B2E1B;--forest:#2D4A2D;--forest-mid:#3A5C3A;--forest-light:#4A6E4A;
  --sage-dark:#5E8055;--sage:#7FA878;--sage-light:#A5C4A0;--sage-pale:#C8DCC4;--sage-mist:#E2EDE0;
  --cream:#FAF7F2;--cream-warm:#F2EDE5;--linen:#EAE3D8;--sand:#DDD5C8;
  --gold:#B8963E;--gold-light:#D4B15C;--gold-pale:#E8DDB8;
  --text-on-dark:#F0ECE4;--text-on-dark-soft:rgba(240,236,228,.7);--text-on-dark-muted:rgba(240,236,228,.45);
  --text:#1A1A18;--text-body:#3D3B37;--text-mid:#6A665F;--text-muted:#9A9690;
  --ff-display:'Cormorant',Georgia,serif;--ff-body:'DM Sans',system-ui,sans-serif;
  --mw:1120px;--r:4px;--py:clamp(5rem,10vw,8rem);
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);font-weight:400;font-size:17px;line-height:1.75;color:var(--text-body);background:var(--cream);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
.wrap{width:90%;max-width:var(--mw);margin:0 auto}.tc{text-align:center}
.tag-light{font-family:var(--ff-body);font-weight:500;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-light);display:block;margin-bottom:10px}
.title-light{font-family:var(--ff-display);font-weight:400;font-size:clamp(2.2rem,5vw,3.4rem);line-height:1.15;color:var(--text-on-dark);margin-bottom:8px}
.title-light em{font-style:italic;color:var(--sage-light)}
.sub-light{font-family:var(--ff-display);font-weight:300;font-style:italic;font-size:19px;color:var(--text-on-dark-soft);max-width:520px;margin:0 auto;line-height:1.6}
.tag-dark{font-family:var(--ff-body);font-weight:500;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:10px}
.title-dark{font-family:var(--ff-display);font-weight:400;font-size:clamp(2.2rem,5vw,3.4rem);line-height:1.15;color:var(--text);margin-bottom:8px}
.title-dark em{font-style:italic;color:var(--forest-mid)}
.sub-dark{font-family:var(--ff-display);font-weight:300;font-style:italic;font-size:19px;color:var(--text-mid);max-width:520px;margin:0 auto;line-height:1.6}

/* ===== BOTANICAL DIVIDERS ===== */
.divider-botanical{display:flex;align-items:center;justify-content:center;margin:22px auto 0;width:200px;gap:0}
.divider-botanical svg{flex-shrink:0}

/* ===== REVEAL ===== */
.rv{opacity:0;transform:translateY(28px);transition:opacity .85s cubic-bezier(.22,1,.36,1),transform .85s cubic-bezier(.22,1,.36,1)}
.rv.vis{opacity:1;transform:none}.rv-d1{transition-delay:.1s}.rv-d2{transition-delay:.2s}

/* ===== NAV ===== */
.nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:16px 0;transition:all .45s;background:linear-gradient(180deg,rgba(27,46,27,.85) 0%,rgba(27,46,27,.4) 70%,transparent 100%)}
.nav.scrolled{background:rgba(27,46,27,.96);backdrop-filter:blur(14px);padding:10px 0;box-shadow:0 2px 20px rgba(0,0,0,.15)}
.nav-in{display:flex;align-items:center;justify-content:space-between;width:90%;max-width:var(--mw);margin:0 auto}
.nav-logo{font-family:var(--ff-display);font-size:22px;font-weight:500;color:var(--text-on-dark);text-decoration:none;transition:.4s;display:flex;align-items:center;gap:8px}
.nav-logo svg{width:20px;height:20px}
.nav-menu{display:flex;gap:28px;list-style:none}
.nav-menu a{font-family:var(--ff-body);font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,236,228,.75);text-decoration:none;transition:.3s}
.nav-menu a:hover{color:var(--gold-light)}
.ham{display:none;background:0;border:0;cursor:pointer;padding:6px;flex-direction:column;gap:5px}
.ham span{width:24px;height:2px;background:var(--text-on-dark);transition:.3s;display:block;border-radius:1px}
.ham.on span:nth-child(1){transform:rotate(45deg) translate(4px,5px)}
.ham.on span:nth-child(2){opacity:0}
.ham.on span:nth-child(3){transform:rotate(-45deg) translate(4px,-5px)}
@media(max-width:800px){
.nav-menu{position:fixed;top:0;right:-100%;width:75%;max-width:320px;height:100dvh;background:var(--forest-deep);flex-direction:column;padding:80px 32px;gap:20px;transition:right .4s cubic-bezier(.22,1,.36,1);box-shadow:-8px 0 30px rgba(0,0,0,.25)}
.nav-menu.open{right:0}.nav-menu a{color:var(--text-on-dark-soft)!important;font-size:15px}.ham{display:flex}}

.hero-dim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(27,46,27,.78) 0%,rgba(27,46,27,.72) 30%,rgba(27,46,27,.75) 60%,rgba(27,46,27,.85) 100%)}

/* Lace/veil corner overlays */
.hero-lace-tl,.hero-lace-tr,.hero-lace-bl,.hero-lace-br{position:absolute;z-index:1;pointer-events:none;opacity:.12}
.hero-lace-tl{top:0;left:0;width:280px;height:280px}
.hero-lace-tr{top:0;right:0;width:280px;height:280px;transform:scaleX(-1)}
.hero-lace-bl{bottom:0;left:0;width:200px;height:200px;transform:scaleY(-1)}
.hero-lace-br{bottom:0;right:0;width:200px;height:200px;transform:scale(-1)}
@media(max-width:800px){.hero-lace-tl,.hero-lace-tr{width:160px;height:160px}.hero-lace-bl,.hero-lace-br{width:120px;height:120px}}

.hero-c{position:relative;z-index:2;padding:24px;padding-top:100px}
.hero-inv{font-family:var(--ff-body);font-weight:400;font-size:14px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold-light);opacity:0;animation:rise 1s .3s forwards}

/* Rings icon */
.hero-rings{margin:20px auto 8px;opacity:0;animation:rise 1s .45s forwards}
.hero-rings svg{width:48px;height:48px}

.hero-names{font-family:var(--ff-display);font-weight:300;font-size:clamp(3.2rem,10vw,7.5rem);line-height:1;color:var(--text-on-dark);margin:8px 0;opacity:0;animation:rise 1.2s .6s forwards}
.hero-names .amp{display:block;font-family:var(--ff-display);font-style:italic;font-weight:300;font-size:.32em;color:var(--gold-light);letter-spacing:.15em;margin:10px 0}

/* Botanical frame under names */
.hero-frame{margin:12px auto 0;opacity:0;animation:rise 1s .85s forwards}
.hero-frame svg{width:clamp(200px,40vw,340px);height:auto}

.hero-where{font-family:var(--ff-display);font-weight:300;font-style:italic;font-size:clamp(18px,2.5vw,24px);color:var(--sage-light);margin-top:16px;opacity:0;animation:rise 1s 1s forwards}
.hero-where i{margin:0 12px;opacity:.35;font-style:normal}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:36px;opacity:0;animation:rise 1s 1.3s forwards}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;font-family:var(--ff-body);font-weight:500;font-size:14px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:.35s;border-radius:var(--r)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 28px rgba(184,150,62,.3)}
.btn-ghost{background:transparent;color:var(--text-on-dark);border:1.5px solid rgba(240,236,228,.3)}.btn-ghost:hover{background:rgba(240,236,228,.08);border-color:rgba(240,236,228,.5)}
.btn-forest{background:var(--forest);color:var(--text-on-dark)}.btn-forest:hover{background:var(--forest-mid);transform:translateY(-2px)}
.hero-arr{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:2;opacity:0;animation:rise 1s 1.7s forwards}
.hero-arr span{display:block;width:1.5px;height:48px;background:linear-gradient(to bottom,var(--gold-light),transparent);margin:0 auto;animation:bob 2.5s infinite}
@media(max-width:800px){.hero-img{background-position:center 35%!important}.hero-arr{display:none}.hero-btns{margin-bottom:env(safe-area-inset-bottom,12px)}.hero{padding-bottom:24px}}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{opacity:.25}50%{opacity:.85}}

/* ===== SECTION TRANSITION LEAVES ===== */
.sec-leaves{position:relative;overflow:hidden}
.sec-leaves .leaf-l,.sec-leaves .leaf-r{position:absolute;top:50%;pointer-events:none;opacity:.06}
.sec-leaves .leaf-l{left:-20px;transform:translateY(-50%) rotate(-15deg)}
.sec-leaves .leaf-r{right:-20px;transform:translateY(-50%) rotate(15deg) scaleX(-1)}
@media(max-width:800px){.sec-leaves .leaf-l,.sec-leaves .leaf-r{display:none}}

/* ===== STORY ===== */
.story{padding:var(--py) 0;background:var(--forest);color:var(--text-on-dark)}
.story-g{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,5vw,56px);align-items:center;margin-top:40px}
.story-t p{font-size:17px;line-height:1.85;color:var(--text-on-dark-soft);margin-bottom:16px}
.story-t p:first-of-type::first-letter{font-family:var(--ff-display);font-size:56px;float:left;line-height:.85;margin:4px 8px 0 0;color:var(--sage-light);font-weight:500}
.story-p{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.story-pic{border-radius:var(--r);overflow:hidden}
.story-pic img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.story-pic:hover img{transform:scale(1.03)}
.story-pic.pt{aspect-ratio:3/4}.story-pic.wd{grid-column:1/-1;aspect-ratio:16/10}
.story-pic:nth-child(2){transform:translateY(20px)}
@media(max-width:800px){.story-g{grid-template-columns:1fr}.story-p{order:-1}.story-pic:nth-child(2){transform:none}}

/* ===== GALLERY CAROUSEL ===== */
.gal{padding:48px 0 var(--py);background:var(--forest-mid);overflow:hidden}
.gal .tc{margin-bottom:32px}
.gal-wrap{position:relative;width:90%;max-width:var(--mw);margin:0 auto}
.gal-track{display:flex;gap:12px;overflow:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;border-radius:var(--r)}
.gal-track img{min-width:calc(33.333% - 8px);height:320px;object-fit:cover;border-radius:var(--r);scroll-snap-align:start;flex-shrink:0;cursor:pointer;transition:opacity .3s}
.gal-track img:hover{opacity:.85}
.gal-btn{position:absolute;top:50%;width:48px;height:48px;border-radius:50%;background:rgba(27,46,27,.7);backdrop-filter:blur(8px);border:1px solid rgba(240,236,228,.15);color:var(--text-on-dark);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;z-index:2;transform:translateY(-50%)}
.gal-btn:hover{background:rgba(27,46,27,.9);border-color:var(--gold)}
.gal-btn svg{width:20px;height:20px}
.gal-prev{left:-24px}
.gal-next{right:-24px}
.gal-dots{display:flex;justify-content:center;gap:8px;margin-top:20px}
.gal-dot{width:8px;height:8px;border-radius:50%;background:rgba(240,236,228,.25);border:none;cursor:pointer;transition:.3s;padding:0}
.gal-dot.on{background:var(--gold-light);transform:scale(1.25)}
@media(max-width:800px){
.gal-track img{min-width:calc(50% - 6px);height:240px}
.gal-prev{left:8px}.gal-next{right:8px}
.gal-btn{width:40px;height:40px;background:rgba(27,46,27,.8)}
}

/* ===== INFO ===== */
.info{padding:var(--py) 0;background:var(--sage-dark);color:var(--text-on-dark)}
.info-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
.info-card{padding:36px 28px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);text-align:center;transition:.35s}
.info-card:hover{background:rgba(255,255,255,.12);transform:translateY(-3px)}
.info-card h3{font-family:var(--ff-display);font-size:26px;font-weight:500;color:var(--text-on-dark);margin:12px 0}
.info-card p{font-size:16px;color:var(--text-on-dark-soft);line-height:1.7}
.info-card a{color:var(--gold-light);text-decoration:underline;text-underline-offset:3px}
.info-card strong{color:var(--text-on-dark);font-weight:500}
.info-warn{margin-top:24px;padding:20px 24px;background:rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);font-size:15px;color:var(--text-on-dark-soft);line-height:1.75}
.info-warn strong{color:var(--gold-light);font-weight:500}
.tl{margin-top:48px}
.tl h3{font-family:var(--ff-display);font-weight:400;font-size:28px;color:var(--text-on-dark);text-align:center;margin-bottom:32px}
.tl-row{display:flex;justify-content:center;flex-wrap:wrap}
.tl-item{text-align:center;padding:16px 28px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;right:0;top:25%;width:1px;height:50%;background:rgba(255,255,255,.15)}
.tl-time{font-family:var(--ff-display);font-size:28px;font-weight:500;color:var(--gold-light)}
.tl-name{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-on-dark-muted);margin-top:2px}
.map-box{margin-top:40px;height:340px;border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.map-box iframe{width:100%;height:100%;border:0}
@media(max-width:800px){.info-cards{grid-template-columns:1fr}.tl-row{flex-direction:column;align-items:center}.tl-item::after{display:none}}

/* ===== ACCOMMODATION ===== */
.accom{padding:var(--py) 0;background:var(--sage-mist)}
.accom-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:40px}
.accom-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1px solid var(--sage-pale);transition:.4s}
.accom-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.08)}
.accom-img{height:220px;background:linear-gradient(135deg,var(--sage-mist),var(--sage-pale));display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-muted)}
.accom-body{padding:28px}
.accom-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--forest);background:rgba(45,74,45,.08);padding:5px 12px;border-radius:3px;margin-bottom:12px}
.accom-card h3{font-family:var(--ff-display);font-size:26px;font-weight:500;color:var(--text);margin-bottom:8px}
.accom-card p{font-size:16px;color:var(--text-body);line-height:1.75;margin-bottom:16px}
.accom-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.accom-chip{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;background:var(--sage-mist);color:var(--text-mid);border-radius:3px}
.accom-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--sage-mist);font-size:15px;color:var(--text-mid)}
.accom-foot strong{font-weight:500;color:var(--forest);font-size:18px}
@media(max-width:800px){.accom-grid{grid-template-columns:1fr}}

/* ===== FORMS ===== */
.form-sec{padding:var(--py) 0;background:var(--cream-warm)}
.form-sec.cream{background:var(--cream)}
.form-box{max-width:620px;margin:36px auto 0}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}.fr.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column}
.fg label{font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mid);margin-bottom:6px}
.fg input,.fg select,.fg textarea{font-family:var(--ff-body);font-size:16px;font-weight:400;padding:14px 16px;border:1.5px solid var(--sand);background:#fff;color:var(--text);border-radius:var(--r);outline:none;transition:.3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--forest-mid);box-shadow:0 0 0 3px rgba(45,74,45,.1)}
.fg textarea{resize:vertical;min-height:100px}
.rg{display:flex;gap:12px;margin-top:4px}
.rc{flex:1;position:relative}
.rc input{position:absolute;opacity:0;width:0;height:0}
.rc label{display:flex;flex-direction:column;align-items:center;padding:18px 12px;border:1.5px solid var(--sand);border-radius:var(--r);cursor:pointer;transition:.3s;text-align:center}
.rc label .ri{font-size:24px;margin-bottom:6px}.rc label .rn{font-weight:500;font-size:16px;color:var(--text)}.rc label .rs{font-size:13px;color:var(--text-muted);margin-top:2px}
.rc input:checked+label{border-color:var(--forest);background:rgba(45,74,45,.06);box-shadow:0 0 0 1px var(--forest)}
.fsub{text-align:center;margin-top:24px}.fsub .btn{min-width:220px;justify-content:center}
.form-ok{display:none;text-align:center;padding:48px 24px}.form-ok.show{display:block}
.form-ok .oi{width:64px;height:64px;border-radius:50%;background:var(--sage-mist);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:var(--forest)}
.form-ok h3{font-family:var(--ff-display);font-size:28px;color:var(--text);margin-bottom:6px}
.form-ok p{font-size:16px;color:var(--text-mid)}
@media(max-width:600px){.fr{grid-template-columns:1fr}.rg{flex-direction:column}}

/* ===== DRESSCODE ===== */
.dress{padding:var(--py) 0;background:var(--forest-deep);color:var(--text-on-dark);text-align:center;position:relative;overflow:hidden}
.dress::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(90,128,85,.15) 0%,transparent 60%);pointer-events:none}
.dress-text{max-width:580px;margin:28px auto 0;font-family:var(--ff-display);font-weight:300;font-style:italic;font-size:20px;color:var(--text-on-dark-soft);line-height:1.8}
.dress-text strong{font-weight:500;color:var(--text-on-dark)}
.swatches{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:40px}
.sw{text-align:center}.sw-dot{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;border:2px solid rgba(255,255,255,.1);transition:.3s}
.sw:hover .sw-dot{transform:scale(1.12)}
.sw-nm{font-family:var(--ff-body);font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-on-dark-muted)}

/* ===== FAQ ===== */
.faq{padding:var(--py) 0;background:var(--cream)}
.faq-list{max-width:680px;margin:36px auto 0}
.faq-item{border-bottom:1.5px solid var(--linen)}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:22px 0;background:0;border:0;cursor:pointer;text-align:left;font-family:var(--ff-display);font-size:22px;font-weight:500;color:var(--text);transition:.3s;gap:16px}
.faq-q:hover{color:var(--forest-mid)}
.faq-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;transition:.3s}
.faq-icon::before,.faq-icon::after{content:'';position:absolute;background:var(--gold);transition:.3s}
.faq-icon::before{width:10px;height:1.5px}.faq-icon::after{width:1.5px;height:10px}
.faq-item.open .faq-icon{background:var(--gold);border-color:var(--gold)}
.faq-item.open .faq-icon::before,.faq-item.open .faq-icon::after{background:#fff}
.faq-item.open .faq-icon::after{transform:rotate(90deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-a-in{padding:0 0 22px;font-size:16px;line-height:1.85;color:var(--text-mid)}

/* ===== CONTACT ===== */
.contact{padding:var(--py) 0;background:var(--cream-warm);text-align:center}
.contact-row{display:flex;justify-content:center;gap:56px;flex-wrap:wrap;margin-top:28px}
.contact-box h4{font-family:var(--ff-display);font-size:14px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.contact-box a{font-family:var(--ff-display);font-size:24px;font-weight:400;color:var(--text);text-decoration:none;transition:.3s}
.contact-box a:hover{color:var(--forest-mid)}

/* ===== FOOTER ===== */
.footer{background:var(--forest-deep);text-align:center;padding:48px 0}
.footer-monogram{margin:0 auto 16px}
.footer-monogram svg{width:48px;height:48px}
.footer-names{font-family:var(--ff-display);font-size:32px;font-weight:300;color:var(--text-on-dark)}
.footer-date{font-family:var(--ff-body);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-on-dark-muted);margin-top:6px}
.footer-note{margin-top:28px;font-size:13px;color:rgba(240,236,228,.2);font-family:var(--ff-display);font-style:italic}
</style>

<!-- STORY -->
<section class="story sec-leaves" id="story"><div class="wrap"><div class="tc rv"><span class="tag-light">Náš příběh</span><h2 class="title-light">Od pohovoru <em>k oltáři</em></h2><div class="divider-botanical"><svg width="200" height="24" color="var(--gold-pale)"><use href="#branch"/></svg></div></div><div class="story-g"><div class="story-t rv rv-d1"><p>Náš příběh nezačal tradičními romantickými pohledy, ale vlastně docela formálně — na pracovním pohovoru. Lukáš tehdy seděl na židli šéfa a Terka žádala o práci. Kdyby nám tehdy někdo řekl, jak moc se naše životy propletou, asi bychom tomu vůbec nevěřili. O pár let později jsme si spolu zatančili na High Jumpu a přeskočila mezi námi jiskra, která už nikdy nezhasla.</p><p>Náš vztah poté nabral neuvěřitelný spád. Začínali jsme v jedné jediné místnosti s malým balkonem, kde se rodily naše první plány, a v době covidu jsme se stěhovali do prvního společného bytu. Ne vždy ale bylo všechno jen zalité sluncem. Prošli jsme si i obdobím, kdy jsme se na chvíli ztratili každý jiným směrem. Zjistili jsme ale to nejdůležitější — že opravdová láska si cestu vždycky najde. Znovu jsme se dali dohromady a tenhle krok z nás udělal mnohem silnější pár.</p><p>Dnes žijeme přesně ten příběh, o kterém jsme před pár lety jen tiše snili. Náš společný domov voní jehličím uprostřed brdských lesů, společnost nám dělá milovaný kocour a sedm slepiček, užíváme si života a objevujeme svět na cestách. Tím vůbec největším zázrakem je ale náš syn Benjamin. Otevřel nám srdce dokořán a udělal z nás rodinu.</p><p>Právě teď, když se díváme na všechno, co jsme spolu vybudovali, cítíme, že nastal čas náš splněný sen zpečetit. Bude nám tou největší ctí, když u tohoto okamžiku budete s námi.</p></div><div class="story-p rv rv-d2"><div class="story-pic pt"><img src="story-1.jpg" alt="Lukáš a Tereza" loading="lazy"></div><div class="story-pic pt"><img src="story-2.jpg" alt="Lukáš a Tereza" loading="lazy"></div><div class="story-pic wd"><img src="story-3.jpg" alt="Naše rodina" loading="lazy"></div></div></div></div></section>

<!-- FAQ -->
<section class="faq" id="faq"><div class="wrap"><div class="tc rv"><span class="tag-dark">Časté dotazy</span><h2 class="title-dark">Vše, co potřebujete <em>vědět</em></h2><div class="divider-botanical"><svg width="200" height="24" color="var(--sage)"><use href="#branch"/></svg></div></div><div class="faq-list"><div class="faq-item rv"><button class="faq-q">Mohu přijít s dětmi?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">Samozřejmě! V areálu je dětské hřiště a dostatek prostoru. Dejte nám prosím vědět v RSVP, kolik dětí přijde.</div></div></div><div class="faq-item rv"><button class="faq-q">Jak se tam dostanu?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">Rochota je cca 29 km od Prahy (30 min autem). Jeďte přes vesnici Halouny — nenastavujte GPS na druhou stranu! Doporučujeme Waze. Parkování pro 35 aut v areálu zdarma.</div></div></div><div class="faq-item rv"><button class="faq-q">Kde bude obřad?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">U romantického jezírka s molem v zahradě penzionu. V případě deště — prosklená zimní zahrada s výhledem do sadu a lesa.</div></div></div><div class="faq-item rv"><button class="faq-q">Jaké bude jídlo?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">Rochota je známá vynikající kuchyní — moderní česká gastronomie z regionálních surovin. Bohatý raut včetně vegetariánských variant.</div></div></div><div class="faq-item rv"><button class="faq-q">Do kolika bude párty?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">Rochota je na samotě v lese — žádná hluková omezení! Párty plánujeme do ranních hodin. Proto doporučujeme ubytování přímo v areálu.</div></div></div><div class="faq-item rv"><button class="faq-q">Je k dispozici wellness?<span class="faq-icon"></span></button><div class="faq-a"><div class="faq-a-in">Ano! Sauna a vířivka v areálu. Ideální na relaxaci po svatební pár <script>
const nav=document.getElementById('nav'),ham=document.getElementById('ham'),menu=document.getElementById('menu');
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>50));
ham.onclick=()=>{ham.classList.toggle('on');menu.classList.toggle('open')};
function cN(){ham.classList.remove('on');menu.classList.remove('open')}
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('vis');obs.unobserve(x.target)}})},{threshold:.1,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
document.querySelectorAll('.faq-q').forEach(b=>{b.onclick=()=>{const it=b.parentElement,a=it.querySelector('.faq-a'),o=it.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>{i.classList.remove('open');i.querySelector('.faq-a').style.maxHeight=null});if(!o){it.classList.add('open');a.style.maxHeight=a.scrollHeight+'px'}}});
function initF(fId,sId){const f=document.getElementById(fId),ok=document.getElementById(sId);f.onsubmit=e=>{e.preventDefault();const d=Object.fromEntries(new FormData(f).entries());console.log('['+fId+']',d);f.style.display='none';ok.classList.add('show')}}
initF('bookForm','bOk');initF('rsvpForm','rOk');
// Gallery carousel
(function(){
const track=document.getElementById('galTrack');
const dotsBox=document.getElementById('galDots');
const imgs=track.querySelectorAll('img');
const prev=document.querySelector('.gal-prev');
const next=document.querySelector('.gal-next');
let perView=()=>window.innerWidth<=800?2:3;
let pages=()=>Math.ceil(imgs.length/perView());
let cur=0;

function buildDots(){
  dotsBox.innerHTML='';
  for(let i=0;i<pages();i++){
    const d=document.createElement('button');
    d.className='gal-dot'+(i===cur?' on':'');
    d.onclick=()=>goTo(i);
    dotsBox.appendChild(d);
  }
}
function goTo(i){
  cur=Math.max(0,Math.min(i,pages()-1));
  const imgW=track.querySelector('img').offsetWidth+12;
  track.scrollTo({left:cur*perView()*imgW,behavior:'smooth'});
  dotsBox.querySelectorAll('.gal-dot').forEach((d,j)=>d.classList.toggle('on',j===cur));
}
prev.onclick=()=>goTo(cur-1);
next.onclick=()=>goTo(cur+1);

// Touch swipe
let tx=0;
track.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
track.addEventListener('touchend',e=>{
  const diff=tx-e.changedTouches[0].clientX;
  if(Math.abs(diff)>40){diff>0?goTo(cur+1):goTo(cur-1)}
});

buildDots();
window.addEventListener('resize',()=>{cur=0;buildDots();goTo(0)});
})();

document.querySelectorAll('a[href^="#"]').forEach(a=>{a.onclick=function(e){e.preventDefault();const t=document.querySelector(this.getAttribute('href'));if(t)scrollTo({top:t.getBoundingClientRect().top+scrollY-70,behavior:'smooth'})}});
</script>
